```properties
```properties
# =========================
# SERVER
# =========================

# Spring Boot application port
server.port=8080

# Application context path
# Leave empty to access APIs directly:
# http://localhost:8080/api/v1/...
server.servlet.context-path=

# Optional application name
spring.application.name=ResumeIQ-AI
```


# =========================
# DATABASE (SUPABASE POSTGRESQL)
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA & HIBERNATE
# =========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# =========================
# FLYWAY
# =========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# =========================
# FILE UPLOAD
# =========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================
# CACHE
# =========================
spring.cache.type=simple

# =========================
# ACTUATOR
# =========================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# =========================
# JWT
# =========================
resumeiq.jwt.secret=${JWT_SECRET}
resumeiq.jwt.expirationMs=3600000
resumeiq.jwt.refreshExpirationMs=604800000

# =========================
# GEMINI
# =========================
gemini.api.key=${GEMINI_API_KEY}
gemini.api.model=gemini-2.5-flash
gemini.api.base-url=https://generativelanguage.googleapis.com

# =========================
# LOGGING
# =========================
logging.level.com.resumeiq=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.file.name=logs/resumeiq.log
```
